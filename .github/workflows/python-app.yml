# This workflow will install Python dependencies, run tests and lint with a single version of Python
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-python

name: techflow cicd

on:
  push:
    branches: [ "main" ]

concurrency:
  group: techflow-prod
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: |
          pip install -r requirements.txt
          pip install pytest
      - run: pytest -v

  build-and-push:
    needs: test
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.meta.outputs.image_tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Set image tag
        id: meta
        run: echo "image_tag=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/techflow-project:latest \
                       -t ${{ secrets.DOCKER_USERNAME }}/techflow-project:${GITHUB_SHA::7} .

      - name: Push image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/techflow-project:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/techflow-project:${GITHUB_SHA::7}

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Deploy with rollback
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e

            APP_NAME="techflow-container"
            IMAGE_REPO="${{ secrets.DOCKER_USERNAME }}/techflow-project"
            NEW_TAG="${{ needs.build-and-push.outputs.image_tag }}"
            PREV_FILE="$HOME/previous_techflow_image.txt"

            # Save currently running image, if any
            CURRENT_IMAGE=$(docker inspect --format='{{.Config.Image}}' $APP_NAME 2>/dev/null || true)
            if [ -n "$CURRENT_IMAGE" ]; then
              echo "$CURRENT_IMAGE" > "$PREV_FILE"
            fi

            # Pull and run new version
            docker pull $IMAGE_REPO:$NEW_TAG
            docker stop $APP_NAME || true
            docker rm $APP_NAME || true
            docker run -d -p 5000:5000 --name $APP_NAME $IMAGE_REPO:$NEW_TAG

            # Give app time to start
            sleep 10

            # Health check
            if curl -f http://localhost:5000; then
              echo "Deployment successful"
              docker tag $IMAGE_REPO:$NEW_TAG $IMAGE_REPO:stable
            else
              echo "Health check failed. Rolling back..."
              docker stop $APP_NAME || true
              docker rm $APP_NAME || true

              if [ -f "$PREV_FILE" ]; then
                PREV_IMAGE=$(cat "$PREV_FILE")
                docker pull "$PREV_IMAGE" || true
                docker run -d -p 5000:5000 --name $APP_NAME "$PREV_IMAGE"
                echo "Rolled back to $PREV_IMAGE"
              else
                echo "No previous image found to roll back to"
                exit 1
              fi

              exit 1
            fi
